<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceGo — Trang chủ</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <main class="app-shell" aria-label="Trang chủ VoiceGo">
        <section class="hero-band">
            <a class="voice-search" href="index.html" aria-label="Đặt chuyến xe bằng giọng nói">
                <span class="search-icon" aria-hidden="true">🎙️</span>
                <span>Đặt chuyến bằng giọng nói</span>
            </a>
        </section>

        <section class="services" aria-label="Dịch vụ">
            <a class="service-item active" href="index.html" aria-label="Đặt xe máy bằng giọng nói">
                <span class="service-icon">🛵</span>
                <span>Xe máy</span>
            </a>
            <a class="service-item active" href="index.html" aria-label="Đặt ô tô bằng giọng nói">
                <span class="service-icon">🚕</span>
                <span>Ô tô</span>
            </a>
            <button class="service-item" type="button">
                <span class="service-icon">🚙</span>
                <span>Đặt trước</span>
            </button>
            <button class="service-item" type="button">
                <span class="service-icon">📦</span>
                <span>Giao hàng</span>
            </button>
            <button class="service-item" type="button">
                <span class="service-icon">🔍</span>
                <span>Đồ ăn</span>
            </button>
            <button class="service-item" type="button">
                <span class="service-icon">🍽️</span>
                <span>Đi Ăn</span>
            </button>
            <button class="service-item" type="button">
                <span class="service-icon">🛍️</span>
                <span>Đi chợ</span>
            </button>
            <button class="service-item" type="button">
                <span class="service-icon">🎁</span>
                <span>Quà tặng</span>
            </button>
        </section>

        <div class="pager" aria-hidden="true">
            <span class="pager-dot active"></span>
            <span class="pager-dot"></span>
        </div>

        <section class="wallet-card" aria-label="Ví liên kết">
            <div>
                <p>Ví liên kết</p>
                <strong>Viettel Money 0...</strong>
            </div>
            <span class="wallet-badge" aria-hidden="true">▯</span>
        </section>

        <section class="promos" aria-label="Ưu đãi hôm nay">
            <h1>Ưu đãi hôm nay</h1>
            <article class="promo-card">
                <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=900&q=80" alt="Ly nước chanh bạc hà">
            </article>
            <article class="promo-card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=900&q=80" alt="Pizza rau củ">
            </article>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Điều hướng chính">
        <a class="nav-item active" href="home.html">
            <span>🏠</span>
            <span>Trang chủ</span>
        </a>
        <a class="nav-item" href="report-accessibility.html">
            <span>🧭</span>
            <span>Khám phá</span>
        </a>
        <a class="nav-item" href="#">
            <span>👤</span>
            <span>Profile</span>
        </a>
        <a class="nav-item" href="#">
            <span>📋</span>
            <span>Hoạt động</span>
        </a>
        <a class="nav-item" href="#">
            <span>💬</span>
            <span>Tin nhắn</span>
        </a>
    </nav>

    <script src="js/home.js"></script>
</body>
</html>

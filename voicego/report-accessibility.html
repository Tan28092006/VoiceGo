<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceGo — Report accessibility place</title>
    <link rel="stylesheet" href="css/report-admin.css">
</head>
<body>
    <main class="page-shell">
        <header class="top-bar">
            <a href="home.html" aria-label="Quay lại trang chủ">‹</a>
            <div>
                <p>Khám phá</p>
                <h1>Report accessibility place</h1>
            </div>
        </header>

        <section class="intro-card">
            <span aria-hidden="true">♿</span>
            <div>
                <strong>Đóng góp địa điểm dễ tiếp cận</strong>
                <p>Thông tin của bạn sẽ được admin duyệt trước khi cộng điểm thưởng.</p>
            </div>
        </section>

        <form class="report-form" aria-label="Form báo cáo accessibility place">
            <label>
                <span>Name</span>
                <input name="name" type="text" maxlength="255" placeholder="Ví dụ: Chợ Bến Thành" required>
            </label>

            <label>
                <span>Address</span>
                <textarea name="address" rows="3" placeholder="Nhập địa chỉ đầy đủ" required></textarea>
            </label>

            <div class="field-grid">
                <label>
                    <span>Lat</span>
                    <input name="lat" type="number" step="0.0000001" placeholder="10.7769000" required>
                </label>
                <label>
                    <span>Lng</span>
                    <input name="lng" type="number" step="0.0000001" placeholder="106.7009000" required>
                </label>
            </div>

            <fieldset class="choice-card">
                <legend>Disability accessible entrance</legend>
                <label>
                    <input type="radio" name="disability_accessible_entrance" value="1" checked>
                    <span>Có lối vào thuận tiện</span>
                </label>
                <label>
                    <input type="radio" name="disability_accessible_entrance" value="0">
                    <span>Chưa thuận tiện</span>
                </label>
            </fieldset>

            <label>
                <span>Accessibility score</span>
                <select name="accessibility_score" required>
                    <option value="5">5 - Rất dễ tiếp cận</option>
                    <option value="4">4 - Tốt</option>
                    <option value="3">3 - Trung bình</option>
                    <option value="2">2 - Khó tiếp cận</option>
                    <option value="1">1 - Không phù hợp</option>
                </select>
            </label>

            <button class="submit-button" type="submit">Submit report</button>
        </form>
    </main>

    <nav class="bottom-nav" aria-label="Điều hướng chính">
        <a class="nav-item" href="home.html">
            <span>🏠</span>
            <span>Trang chủ</span>
        </a>
        <a class="nav-item active" href="report-accessibility.html">
            <span>🧭</span>
            <span>Khám phá</span>
        </a>
        <a class="nav-item" href="#">
            <span>👤</span>
            <span>Profile</span>
        </a>
        <a class="nav-item" href="#">
            <span>📋</span>
            <span>Hoạt động</span>
        </a>
        <a class="nav-item" href="#">
            <span>💬</span>
            <span>Tin nhắn</span>
        </a>
    </nav>
</body>
</html>

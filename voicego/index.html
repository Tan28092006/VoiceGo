<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceGo — Đặt xe bằng giọng nói</title>

    <!-- Leaflet for the route preview map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/voice.css">
</head>
<body>
    <header class="voice-header">
        <div class="voice-title">🎙️ VoiceGo</div>
        <div class="voice-meta">
            <span id="backend-dot" class="backend-dot offline">⚡ Cục bộ</span>
        </div>
    </header>

    <!-- Route preview map (pan/zoom enabled) -->
    <div id="route-map" class="route-map" aria-hidden="true"></div>

    <!-- Trip: pickup is fixed (no GPS); destination is filled once the AI resolves it -->
    <div class="trip-card">
        <div class="trip-row">
            <span class="trip-dot red"></span>
            <span class="trip-label">Điểm đi</span>
            <span id="origin-box" class="trip-value">Trường Đại học Quốc tế</span>
        </div>
        <div class="trip-row">
            <span class="trip-dot green"></span>
            <span class="trip-label">Điểm đến</span>
            <span id="dest-box" class="trip-value muted">Chưa có — hãy nói điểm đến</span>
        </div>
    </div>

    <!-- Status + gesture zone (double-tap = confirm, swipe = change/cancel) -->
    <section id="gesture-zone" class="gesture-zone" aria-label="Khu vực hội thoại với trợ lý">
        <div class="status-wrap" role="status" aria-live="assertive" aria-atomic="true">
            <div id="status" class="status-main">Đang khởi động…</div>
            <div id="substatus" class="status-sub"></div>
        </div>
        <!-- Live speech-to-text: visual stream of what the user is saying -->
        <div id="live-transcript" class="live-transcript" aria-hidden="true"></div>
        <div class="confirm-hint">
            <span class="hint-text">Nói bằng giọng: “đồng ý” để đặt · “ô tô” / “xe ôm” để chọn xe · “huỷ” để dừng</span>
        </div>
    </section>

    <!-- Giant hold-to-talk button -->
    <button id="record-btn" class="record-btn" aria-label="Chạm để nói điểm đến">
        <span class="mic-icon" aria-hidden="true">🎙️</span>
        <span class="record-label">Chạm để nói</span>
    </button>

    <!-- AI Agent overlay: shown on confirm. Streams the agent's actions (token by
         token) so judges see the LLM acting as an autonomous agent. -->
    <div id="agent-overlay" class="agent-overlay hidden" role="dialog" aria-modal="true">
        <div class="agent-box">
            <div class="agent-spinner" aria-hidden="true"></div>
            <div class="agent-title">🤖 AI Agent đang đặt xe…</div>
            <div id="agent-log" class="agent-log" aria-hidden="true"></div>
            <div id="agent-result" class="agent-result" role="status" aria-live="assertive"></div>
        </div>
    </div>

    <!-- Live trip overlay (realtime via teammate's Socket.IO driver app):
         tìm tài xế -> tài xế đến + mã PIN (đọc tự động) -> xác minh an toàn. -->
    <div id="trip-overlay" class="agent-overlay hidden" role="dialog" aria-modal="true">
        <div class="agent-box">
            <div id="trip-spinner" class="agent-spinner" aria-hidden="true"></div>
            <div id="trip-title" class="agent-title">🔎 Đang tìm tài xế…</div>
            <div id="trip-driver" class="trip-driver" role="status" aria-live="polite"></div>
            <div id="trip-pin" class="pin-row" role="status" aria-live="polite"></div>
            <div id="trip-sub" class="agent-result" role="status" aria-live="assertive"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Socket.IO client (4.8.x) to talk to the driver app's realtime server -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="js/seed-data.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/local-engine.js"></script>
    <script src="js/voice-nlu.js"></script>
    <script src="js/voice-recorder.js"></script>
    <script src="js/map-view.js"></script>
    <script src="js/voice-app.js"></script>
</body>
</html>

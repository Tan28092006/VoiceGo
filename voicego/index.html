<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceGo — Đặt xe bằng giọng nói</title>

    <!-- Leaflet for the route preview map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/voice.css">
</head>
<body>
    <header class="voice-header">
        <div class="voice-title">🎙️ VoiceGo</div>
        <div class="voice-meta">
            <span id="backend-dot" class="backend-dot offline">⚡ Cục bộ</span>
        </div>
    </header>

    <!-- Route preview map (for sighted helpers / demo). Non-interactive. -->
    <div id="route-map" class="route-map" aria-hidden="true"></div>

    <!-- Status + gesture zone (double-tap = confirm, swipe = change/cancel) -->
    <section id="gesture-zone" class="gesture-zone" aria-label="Vùng xác nhận. Chạm hai lần để đồng ý, vuốt ngang để đổi xe, vuốt xuống để hủy.">
        <div class="status-wrap" role="status" aria-live="assertive" aria-atomic="true">
            <div id="status" class="status-main">Đang khởi động…</div>
            <div id="substatus" class="status-sub"></div>
        </div>
        <!-- Live speech-to-text: visual stream of what the user is saying -->
        <div id="live-transcript" class="live-transcript" aria-hidden="true"></div>
        <div class="confirm-hint">
            <span id="vehicle-pill" class="vehicle-pill">xe ôm điện</span>
            <span class="hint-text">Chạm 2 lần = Đồng ý · Vuốt ngang = Đổi xe · Vuốt xuống = Hủy</span>
        </div>
    </section>

    <!-- Giant hold-to-talk button -->
    <button id="record-btn" class="record-btn" aria-label="Chạm và giữ để nói điểm đến">
        <span class="mic-icon" aria-hidden="true">🎙️</span>
        <span class="record-label">Chạm &amp; giữ để nói</span>
    </button>

    <!-- Typed fallback for noisy places / no backend -->
    <div class="text-fallback-bar">
        <input id="text-fallback" type="text" placeholder="Hoặc gõ: cho tôi đi Bến Thành" aria-label="Gõ lệnh đặt xe">
        <button id="text-send" aria-label="Gửi lệnh">Gửi</button>
    </div>

    <!-- AI Agent overlay: shown on confirm. Streams the agent's actions (token by
         token) so judges see the LLM acting as an autonomous agent. -->
    <div id="agent-overlay" class="agent-overlay hidden" role="dialog" aria-modal="true">
        <div class="agent-box">
            <div class="agent-spinner" aria-hidden="true"></div>
            <div class="agent-title">🤖 AI Agent đang đặt xe…</div>
            <div id="agent-log" class="agent-log" aria-hidden="true"></div>
            <div id="agent-result" class="agent-result" role="status" aria-live="assertive"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/seed-data.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/local-engine.js"></script>
    <script src="js/voice-nlu.js"></script>
    <script src="js/voice-recorder.js"></script>
    <script src="js/map-view.js"></script>
    <script src="js/voice-app.js"></script>
</body>
</html>
